rootfs:
  - name: rootfs_arm32
    arch: arm

    source:
      path: http://192.168.11.87/repository/download/Intewell-N/rootfs/arm/rootfs.bin

    cache:
      enable: true
      key: rootfs-arm32

    destination:
      mode: copy


  - name: rootfs_aarch64
    arch: aarch64

    source:
      path: http://192.168.11.87/repository/download/Intewell-N/rootfs/aarch64/rootfs.bin

    cache:
      enable: true
      key: rootfs-aarch64

    destination:
      mode: copy


  - name: rootfs_x86_64
    arch: x86_64

    source:
      path: http://192.168.11.87/repository/download/Intewell-N/rootfs/x86_64/rootfs.bin

    cache:
      enable: true
      key: rootfs-x86_64

    destination:
      mode: copy
