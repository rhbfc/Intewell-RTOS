include:
  - ${YAML_ROOT}/dependencies.yaml
  - ${YAML_ROOT}/arch/aarch64.yaml
  - ${YAML_ROOT}/toolchains/aarch64-musl-gcc.yaml
  - ${YAML_ROOT}/rootfs.yaml

name: qemu_aarch64

board:
  variables:
    CONFIG_SOFT_ARCH: aarch64
    CONFIG_BOARD: qemu_aarch64
    CONFIG_FILE:  qemu_aarch64_defconfig
    DTB_FILE:     qemu_aarch64.dtb

dependencies:
  - name: kernel-libc
    git: ${DEPS_GIT_ROOT}/libk.git
    path: dependencies/libk
    ref: main

  - name: lwip
    git: ${DEPS_GIT_ROOT}/lwip.git
    path: dependencies/lwip
    ref: origin/adaptive_for_intewell3.0

  - name: fs
    git: ${DEPS_GIT_ROOT}/libfs.git
    path: dependencies/fs
    ref: main

rootfs:
  name: rootfs_aarch64
