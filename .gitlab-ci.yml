stages:
  - prepare
  - build
  - deploy

default:
  retry:
    max: 2
    when:
      - runner_system_failure
      - api_failure
      - stuck_or_timeout_failure
      - unknown_failure

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      variables:
        RUN_BOARD_TESTS: "true"
    - if: '$CI_COMMIT_TAG'
      variables:
        RUN_BOARD_TESTS: "true"
    - when: always
      variables:
        RUN_BOARD_TESTS: "false"

variables:
  # Default file path in repository; can be overridden by caller pipeline.
  CI_BOARDS_CONFIG: "ci_boards.json"
  QEMU_TIMEOUT: "300"
  TEST_VERSION: "latest"
  DOCS_ONLY: "false"

generate_board_jobs:
  stage: prepare
  image: rtos-builder:latest
  rules:
    - if: '$DOCS_ONLY == "true"'
      when: never
    - when: on_success
  script:
    - cd "$CI_PROJECT_DIR"
    - export BOARDS_CONFIG_PATH="${CI_BOARDS_CONFIG:-ci_boards.json}"
    - |
      if [ -n "${CI_BOARDS_JSON_B64:-}" ]; then
        echo "$CI_BOARDS_JSON_B64" | base64 -d > .ci_boards.from_b64.json
        export BOARDS_CONFIG_PATH=".ci_boards.from_b64.json"
      fi
    - test -f "$BOARDS_CONFIG_PATH"
    - python3 --version
    - python3 build-env/ci/generate_board_jobs.py --config "$BOARDS_CONFIG_PATH" --output generated-board-jobs.yml
  artifacts:
    paths:
      - generated-board-jobs.yml
    expire_in: 1 day

build_boards:
  stage: build
  rules:
    - if: '$DOCS_ONLY == "true"'
      when: never
    - when: on_success
  needs:
    - job: generate_board_jobs
      artifacts: true
  trigger:
    include:
      - artifact: generated-board-jobs.yml
        job: generate_board_jobs
    strategy: depend
    forward:
      pipeline_variables: true

deploy_docs:
  stage: deploy
  image: rtos-builder:latest
  needs:
    - job: build_boards
      optional: true
  rules:
    - if: '$DOCS_ONLY == "true"'
      when: on_success
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - when: never
  variables:
    DOC_DEPLOY_HOST: "192.168.11.87"
    DOC_DEPLOY_USER: "gitlabci"
    DOC_DEPLOY_PATH: "/home/gitlabci/webdoc"
  script:
    - cd "$CI_PROJECT_DIR"
    - python3 --version
    - sphinx-build -M html doc build/sphinx_html
    - test -d build/sphinx_html/html
    - test -n "${DEPLOY_PASSWORD:-}" || (echo "DEPLOY_PASSWORD is empty"; exit 1)
    - export SSHPASS="${DEPLOY_PASSWORD}"
    - sshpass -e rsync -avz -e 'ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no' --delete "build/sphinx_html/html/" "${DOC_DEPLOY_USER}@${DOC_DEPLOY_HOST}:${DOC_DEPLOY_PATH}"
